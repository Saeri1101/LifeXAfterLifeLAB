      <label style="display:block; color:#888; font-size:0.85em; margin-bottom:6px;">Name</label>
      <input type="text" id="contact-name" placeholder="Your name" style="width:100%;" />

      <label style="display:block; color:#888; font-size:0.85em; margin-bottom:6px;">Email</label>

      <label style="display:block; color:#888; font-size:0.85em; margin-bottom:6px;">Message</label>
